name: Expensly CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # CLIENT — lint, type-check, unit tests, build
  # ─────────────────────────────────────────────────────────────────────────────
  client:
    name: Client (React + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run type-check || echo "::warning::TypeScript errors detected — review types"

      - name: Run unit tests
        run: npm test -- --reporter=verbose

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: client-coverage
          path: client/coverage/
          retention-days: 7

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: https://api.expensly.app/api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # SERVER — unit tests, integration tests
  # ─────────────────────────────────────────────────────────────────────────────
  server:
    name: Server (Node.js + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run server tests
        run: npm test -- --reporter=verbose
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET:  test_access_secret_for_ci_only
          JWT_REFRESH_SECRET: test_refresh_secret_for_ci_only
          MONGODB_URI:        mongodb://localhost:27017/expensly_test

  # ─────────────────────────────────────────────────────────────────────────────
  # E2E — Playwright (runs only on push to main, not every PR to save minutes)
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [client, server]
    if: github.ref == 'refs/heads/main' || github.event_name == 'push'
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests (no auth required)
        run: npx playwright test e2e/auth.spec.js e2e/ui.spec.js
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # SECURITY — check for known vulnerabilities in dependencies
  # ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit client dependencies
        run: |
          cd client
          npm audit --audit-level=high || echo "::warning::Client has high severity vulnerabilities"

      - name: Audit server dependencies
        run: |
          cd server
          npm audit --audit-level=high || echo "::warning::Server has high severity vulnerabilities"
