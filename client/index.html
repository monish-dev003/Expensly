<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Expensly</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563EB" />
  <meta name="description" content="Expensly — Smart Personal Finance Manager" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="manifest" href="/manifest.json" />
  <!--
    IMPORTANT: This script runs synchronously BEFORE the first paint.
    It reads the stored theme and applies the "dark" class to <html>
    immediately, preventing any light-mode flash on dark-mode users.
  -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('expensly-theme') || 'system';
        var dark = t === 'dark' ||
          (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      } catch (_) {}
    })();
  </script>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div class="dhiwise-code" id="root"></div>
  <script type="module" src="/src/index.jsx"></script>
</body>
</html>
